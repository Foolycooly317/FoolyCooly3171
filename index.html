<!DOCTYPE html>
<html>
<head>
  <title>FLCL</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #050505;
      color: white;
      font-family: Arial;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-top: 100px;
    }

    img {
      border-radius: 50%;
      width: 150px;
    }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="content">
  <img src="https://cdn.discordapp.com/avatars/1269523754032037935/0b7756e0cdc5edb30c5bf2b3ff9e2bb5.png?size=1024">
  <h1>Your Name</h1>
  <p>This is my custom profile page</p>
</div>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let dots = [];
let mouse = { x: null, y: null, radius: 120 };

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  dots = [];

  for (let i = 0; i < 200; i++) {
    dots.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2 + 1,
      density: Math.random() * 30 + 1
    });
  }
}

window.addEventListener("resize", resize);

window.addEventListener("mousemove", (e) => {
  mouse.x = e.x;
  mouse.y = e.y;
});

window.addEventListener("mouseleave", () => {
  mouse.x = null;
  mouse.y = null;
});

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let dot of dots) {

    // draw dot
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(dot.x, dot.y, dot.size, 0, Math.PI * 2);
    ctx.fill();

    // push away from mouse
    if (mouse.x !== null && mouse.y !== null) {
      let dx = mouse.x - dot.x;
      let dy = mouse.y - dot.y;
      let dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < mouse.radius) {
        let force = (mouse.radius - dist) / mouse.radius;
        dot.x -= (dx / dist) * force * dot.density;
        dot.y -= (dy / dist) * force * dot.density;
      }
    }

    // OPTIONAL: slight drifting (remove if you want completely still dots)
    dot.x += (Math.random() - 0.5) * 0.2;
    dot.y += (Math.random() - 0.5) * 0.2;

    // ONLY reset if off screen
    if (
      dot.x < 0 ||
      dot.x > canvas.width ||
      dot.y < 0 ||
      dot.y > canvas.height
    ) {
      dot.x = Math.random() * canvas.width;
      dot.y = Math.random() * canvas.height;
    }
  }

  requestAnimationFrame(animate);
}

resize();
animate();
</script>

</body>
</html>
