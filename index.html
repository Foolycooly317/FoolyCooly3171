<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let dots = [];
let mouse = { x: null, y: null, radius: 150 };

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  dots = [];

  for (let i = 0; i < 260; i++) {
    dots.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      targetX: null,
      targetY: null,
      size: Math.random() * 2 + 1,
      power: Math.random() * 70 + 35,
      moving: false
    });
  }
}

function randomGoodSpot() {
  let best = { x: Math.random() * canvas.width, y: Math.random() * canvas.height };
  let bestScore = -1;

  for (let i = 0; i < 35; i++) {
    let x = 25 + Math.random() * (canvas.width - 50);
    let y = 25 + Math.random() * (canvas.height - 50);
    let score = Infinity;

    for (let dot of dots) {
      let dx = x - dot.x;
      let dy = y - dot.y;
      let dist = Math.sqrt(dx * dx + dy * dy);
      score = Math.min(score, dist);
    }

    if (score > bestScore) {
      bestScore = score;
      best = { x, y };
    }
  }

  return best;
}

function moveSomeDotsToEmptySpots() {
  let amount = 15 + Math.floor(Math.random() * 15);

  let shuffled = dots
    .filter(dot => !dot.moving)
    .sort(() => Math.random() - 0.5);

  for (let i = 0; i < Math.min(amount, shuffled.length); i++) {
    let spot = randomGoodSpot();
    shuffled[i].targetX = spot.x;
    shuffled[i].targetY = spot.y;
    shuffled[i].moving = true;
  }

  setTimeout(moveSomeDotsToEmptySpots, 3000 + Math.random() * 2000);
}

window.addEventListener("resize", resize);

window.addEventListener("mousemove", (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

window.addEventListener("mouseleave", () => {
  mouse.x = null;
  mouse.y = null;
});

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let dot of dots) {
    let offScreen =
      dot.x < -20 ||
      dot.x > canvas.width + 20 ||
      dot.y < -20 ||
      dot.y > canvas.height + 20;

    if (offScreen && !dot.moving) {
      let spot = randomGoodSpot();
      dot.targetX = spot.x;
      dot.targetY = spot.y;
      dot.moving = true;
    }

    if (dot.moving) {
      dot.x += (dot.targetX - dot.x) * 0.05;
      dot.y += (dot.targetY - dot.y) * 0.05;

      if (Math.abs(dot.x - dot.targetX) < 1 && Math.abs(dot.y - dot.targetY) < 1) {
        dot.x = dot.targetX;
        dot.y = dot.targetY;
        dot.moving = false;
      }
    } else if (mouse.x !== null && mouse.y !== null) {
      let dx = dot.x - mouse.x;
      let dy = dot.y - mouse.y;
      let dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < mouse.radius && dist !== 0) {
        let force = (mouse.radius - dist) / mouse.radius;
        dot.x += (dx / dist) * force * dot.power;
        dot.y += (dy / dist) * force * dot.power;
      }
    }

    // prevents ugly dot lines/clumps
    for (let other of dots) {
      if (dot === other) continue;

      let dx = dot.x - other.x;
      let dy = dot.y - other.y;
      let dist = Math.sqrt(dx * dx + dy * dy);

      if (dist > 0 && dist < 10) {
        dot.x += (dx / dist) * 0.4;
        dot.y += (dy / dist) * 0.4;
      }
    }

    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(dot.x, dot.y, dot.size, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(animate);
}

resize();
moveSomeDotsToEmptySpots();
animate();
</script>
