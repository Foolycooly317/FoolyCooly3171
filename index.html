<!DOCTYPE html>
<html>
<head>
  <title>FLCL</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #050505;
      color: white;
      font-family: Arial;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-top: 80px;
      pointer-events: none;
    }

    img {
      border-radius: 50%;
      width: 150px;
      height: 150px;
      object-fit: cover;
      border: 2px solid white;
      margin-bottom: 15px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      pointer-events: auto; /* allows clicking */
    }

    .btn {
      padding: 10px 20px;
      border: 1px solid white;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      color: white;
      text-decoration: none;
      transition: 0.2s;
    }

    .btn:hover {
      background: white;
      color: black;
    }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="content">
  <img src="https://cdn.discordapp.com/avatars/1269523754032037935/0b7756e0cdc5edb30c5bf2b3ff9e2bb5.png?size=1024">
  <h1>FLCL</h1>

  <div class="buttons">
    <a class="btn" href="https://www.youtube.com/@FLCL317" target="_blank">YouTube</a>
  </div>
</div>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let dots = [];
let mouse = { x: null, y: null, radius: 150 };

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  dots = [];

  for (let i = 0; i < 230; i++) {
    let baseX = Math.random() * canvas.width;
    let baseY = Math.random() * canvas.height;

    dots.push({
      x: baseX,
      y: baseY,
      baseX: baseX,
      baseY: baseY,
      targetX: baseX,
      targetY: baseY,
      size: Math.random() * 2 + 1,
      power: Math.random() * 70 + 35,
      returning: false
    });
  }
}

window.addEventListener("resize", resize);

window.addEventListener("mousemove", (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

window.addEventListener("mouseleave", () => {
  mouse.x = null;
  mouse.y = null;
});

function safeSpot(dot) {
  let x = dot.baseX;
  let y = dot.baseY;

  if (mouse.x !== null && mouse.y !== null) {
    let dx = x - mouse.x;
    let dy = y - mouse.y;
    let dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < mouse.radius + 40) {
      let angle = Math.atan2(dy, dx);
      x = mouse.x + Math.cos(angle) * (mouse.radius + 60);
      y = mouse.y + Math.sin(angle) * (mouse.radius + 60);
    }
  }

  x = Math.max(20, Math.min(canvas.width - 20, x));
  y = Math.max(20, Math.min(canvas.height - 20, y));

  return { x, y };
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let dot of dots) {
    let offScreen =
      dot.x < -10 ||
      dot.x > canvas.width + 10 ||
      dot.y < -10 ||
      dot.y > canvas.height + 10;

    if (offScreen && !dot.returning) {
      let spot = safeSpot(dot);
      dot.targetX = spot.x;
      dot.targetY = spot.y;
      dot.returning = true;
    }

    if (dot.returning) {
      dot.x += (dot.targetX - dot.x) * 0.08;
      dot.y += (dot.targetY - dot.y) * 0.08;

      if (
        Math.abs(dot.x - dot.targetX) < 1 &&
        Math.abs(dot.y - dot.targetY) < 1
      ) {
        dot.x = dot.targetX;
        dot.y = dot.targetY;
        dot.returning = false;
      }
    } else if (mouse.x !== null && mouse.y !== null) {
      let dx = dot.x - mouse.x;
      let dy = dot.y - mouse.y;
      let dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < mouse.radius && dist !== 0) {
        let force = (mouse.radius - dist) / mouse.radius;
        dot.x += (dx / dist) * force * dot.power;
        dot.y += (dy / dist) * force * dot.power;
      }
    }

    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(dot.x, dot.y, dot.size, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(animate);
}

resize();
animate();
</script>

</body>
</html>
